<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrabeshGPT — Chat</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
</head>
<body class="chat-body">
  <div class="noise-overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Home
      </a>
      <div class="logo-mark small">PG<span class="logo-dot">•</span></div>
    </div>

    <div class="sidebar-section">
      <label class="section-label">Active Model</label>
      <div class="model-selector-wrap">
        <select id="modelSelect" class="model-select">
          <!-- Populated from app.js → MODELS array -->
        </select>
        <svg class="select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="model-meta" id="modelMeta">Select a model to see details</div>
    </div>

    <div class="sidebar-section">
      <label class="section-label">API Key</label>
      <div class="api-key-wrap">
        <input type="password" id="apiKeyInput" class="api-key-input" placeholder="Enter your API key…" autocomplete="off" spellcheck="false" />
        <button class="eye-btn" id="toggleKey" title="Show/hide key" aria-label="Toggle API key visibility">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="save-key-btn" id="saveKeyBtn">Save Key</button>
      <div class="key-status" id="keyStatus" aria-live="polite"></div>
    </div>

    <div class="sidebar-actions">
      <button class="action-btn danger" id="clearBtn" title="Clear all messages">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        Clear Chat
      </button>
    </div>
  </aside>

  <!-- SIDEBAR OVERLAY (mobile tap-to-close) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- SIDEBAR TOGGLE (mobile) -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <!-- MAIN CHAT AREA -->
  <main class="chat-main">
    <div class="chat-topbar">
      <div class="active-model-badge" id="activeBadge">No model selected</div>
      <div class="token-counter" id="tokenCounter">0 tokens used</div>
    </div>

    <div class="messages-area" id="messagesArea" role="log" aria-live="polite" aria-label="Chat messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">Ready when you are</div>
      
      </div>
    </div>

    <div class="input-area">
      <div class="input-box-wrap">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Send a message…"
          rows="1"
          aria-label="Message input"
          spellcheck="true"
          autocomplete="off"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-meta">
        <span id="charCount">0 chars</span>
        <span>Press <kbd>Ctrl+Enter</kbd> to send</span>
      </div>
    </div>
  </main>

  <script src="app.js"></script>

  <script>
    // Mobile sidebar overlay tap-to-close
    document.getElementById('sidebarOverlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('active');
    });

    // Keep sidebar toggle in sync with overlay
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    });
  </script>
</body>
</html>
