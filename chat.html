<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="index.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Home
    </a>

    <div class="logo-mark small">
      PG<span class="logo-dot">•</span>
    </div>
  </div>

  <!-- MODEL -->
  <div class="sidebar-section">
    <label class="section-label" for="modelSelect">
      Active Model
    </label>

    <div class="model-selector-wrap">
      <select id="modelSelect" class="model-select"></select>

      <svg
        class="select-arrow"
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>

    <div class="model-meta" id="modelMeta">
      Select a model to see details
    </div>
  </div>

  <!-- API KEY -->
  <div class="sidebar-section">
    <label class="section-label" for="apiKeyInput">
      API Key
    </label>

    <div class="api-key-wrap">
      <input
        type="password"
        id="apiKeyInput"
        class="api-key-input"
        placeholder="Enter your API key…"
        autocomplete="off"
        spellcheck="false"
      />

      <button
        class="eye-btn"
        id="toggleKey"
        type="button"
        title="Show/hide key"
        aria-label="Toggle API key visibility"
      >
        <svg
          id="eyeIcon"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </div>

    <button
      class="save-key-btn"
      id="saveKeyBtn"
      type="button"
    >
      Save Key
    </button>

    <div
      class="key-status"
      id="keyStatus"
      aria-live="polite"
    ></div>
  </div>

  <!-- ACTIONS -->
  <div class="sidebar-actions">
    <button
      class="action-btn danger"
      id="clearBtn"
      type="button"
      title="Clear all messages"
    >
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
        <path d="M10 11v6M14 11v6"></path>
      </svg>

      Clear Chat
    </button>
  </div>
</aside>
